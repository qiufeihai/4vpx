{{define "admin_system_content"}}
<div class="card">
  <h2>系统配置</h2>
  <form method="post" action="/admin/system">
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <div class="row">
      <div><label class="label">对外地址</label><input type="text" name="server_address" value="{{.System.ServerAddress}}"></div>
      <div><label class="label">端口</label><input type="number" name="server_port" value="{{.System.ServerPort}}"></div>
      <div><label class="label">REALITY DEST</label><input type="text" name="reality_dest" value="{{.System.RealityDest}}"></div>
      <div><label class="label">REALITY SNI</label><input type="text" name="reality_server_name" value="{{.System.RealityServerName}}"></div>
      <div><label class="label">Fingerprint</label><input type="text" name="client_fingerprint" value="{{.System.ClientFingerprint}}"></div>
      <div><label class="label">LogLevel</label><input type="text" name="xray_loglevel" value="{{.System.XrayLogLevel}}"></div>
    </div>
    <div class="row">
      <div><label class="label">Private Key</label><input type="text" name="reality_private_key" value="{{.System.RealityPrivateKey}}"></div>
      <div><label class="label">Public Key</label><input type="text" name="reality_public_key" value="{{.System.RealityPublicKey}}"></div>
      <div><label class="label">Short ID</label><input type="text" name="reality_short_id" value="{{.System.RealityShortID}}"></div>
    </div>
    <div class="row">
      <div><label class="label">Xray 配置路径</label><input type="text" name="xray_config_path" value="{{.System.XrayConfigPath}}"></div>
      <div><label class="label">备份路径</label><input type="text" name="xray_backup_path" value="{{.System.XrayBackupPath}}"></div>
      <div><label class="label">Xray 可执行文件</label><input type="text" name="xray_bin" value="{{.System.XrayBin}}"></div>
      <div><label class="label">重载命令</label><input type="text" name="xray_reload_cmd" value="{{.System.XrayReloadCmd}}"></div>
    </div>
    <div style="margin-top:16px;"><button type="submit">保存并发布</button></div>
  </form>
</div>

<div class="card grid grid-2">
  <div>
    <h3>修改管理员密码</h3>
    <form method="post" action="/admin/change-password">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <label class="label">当前密码</label>
      <input type="password" name="current_password">
      <label class="label">新密码</label>
      <input type="password" name="new_password">
      <div style="margin-top:8px;"><button type="submit">更新密码</button></div>
    </form>
  </div>
  <div>
    <h3>备份与恢复</h3>
    <p><a href="/admin/export">导出 JSON 备份</a></p>
    <form method="post" action="/admin/import" style="margin-top:12px;">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <label class="label">粘贴 JSON 备份内容</label>
      <textarea name="backup_json"></textarea>
      <div style="margin-top:8px;"><button type="submit" class="secondary">导入并发布</button></div>
    </form>
  </div>
</div>
{{end}}
